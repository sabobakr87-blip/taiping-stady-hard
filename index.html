<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAIPING STADY HARD - دخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="img/0.png">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w3vj0im5di");
</script>
    <script>
        // هذا السطر يمنع ظهور صفحة التسجيل إذا كان المستخدم مسجلاً بالفعل
        if (localStorage.getItem('isLogged') === 'true') {
            window.location.href = 'profile.html';
        }
    </script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">TAIPING <span>STADY HARD</span></div>
            <h2>إنشاء حساب طالب</h2>
        </div>
        
        <form id="loginForm">
            <div class="image-upload-wrapper">
                <div class="image-preview" id="imagePreview">
                    <i class="fas fa-user-graduate"></i>
                    <img src="" alt="Preview" id="profilePreviewImg">
                </div>
                <label for="userImage" class="upload-label">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="userImage" accept="image/*" style="display: none;">
            </div>

            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="اسم المستخدم" required>
            </div>
            
            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>

            <div class="input-box">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="adress" placeholder="عنوانك بالتفصيل" required>
            </div>

            <div class="input-box">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="رقم الهاتف" required>
            </div>

            <a href="https://chat.whatsapp.com/IfNpgy7GzXQG9EVAsC9vcG" target="_blank" class="whatsapp-btn" id="waBtn">
                <i class="fab fa-whatsapp"></i>
                انضم لمجموعتنا عبر واتساب
            </a>

            <div class="divider">أو</div>

            <button type="submit" class="login-btn">ابدأ المذاكرة الآن</button>
        </form>
    </div>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCF4ej6fVDHzD1IkbDF-GeC3rJ3l_6vbSw",
    authDomain: "taiping-4d86e.firebaseapp.com",
    projectId: "taiping-4d86e",
    storageBucket: "taiping-4d86e.firebasestorage.app",
    messagingSenderId: "579096359325",
    appId: "1:579096359325:web:4af10ad33081b78f68ff74"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ربط الفورم
  const loginForm = document.getElementById('loginForm');

  if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

     // تجهيز البيانات بترتيب منطقي
      const studentData = {
        username: document.getElementById('username').value, // الاسم أولاً
        password: document.getElementById('password').value,
        address: document.getElementById('adress').value,
        phone: document.getElementById('phone').value,
        createdAt: new Date(), // تاريخ التسجيل
        userPhoto: localStorage.getItem('userPhoto') || "" // الصورة في الآخر لأنها أضخم بيانات
      };

      try {
        // إرسال البيانات إلى مجموعة "students" في Firebase
        const docRef = await addDoc(collection(db, "students"), studentData);
        console.log("تم حفظ الطالب في Firebase بالرقم: ", docRef.id);

        // حفظ الحالة محلياً للانتقال لصفحة البروفايل
        localStorage.setItem('isLogged', 'true');
        localStorage.setItem('currentUser', studentData.username);
        localStorage.setItem('userAddress', studentData.address);
        localStorage.setItem('userPhone', studentData.phone);
        
        window.location.href = 'profile.html';
      } catch (error) {
        console.error("خطأ في حفظ البيانات: ", error);
        alert("حدث خطأ أثناء الاتصال بالقاعدة، تأكد من إعدادات Firestore Rules");
      }
    });
  }
</script>
    <script src="script.js"></script>
</body>
</html>
